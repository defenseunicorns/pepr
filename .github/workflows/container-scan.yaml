name: Container Scans

permissions:
  actions: read

on:
  pull_request:
    paths-ignore:
    - "**.md"
    - "LICENSE"
    - "CODEOWNERS"  
  
jobs:
  container-scans:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Use Node.js latest
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: "npm"
      - name: Install Pepr Dependencies
        run: npm ci
      - name: Build Pepr Controller Image
        run: npm run build:image

      - name: Vulnerability Scan
        id: scan
        continue-on-error: true # Scan again with JSON output for artifact upload
        uses: anchore/scan-action@7037fa011853d5a11690026fb85feee79f4c946c # v7.3.2
        with:
          image: "pepr:dev"
          fail-build: true
          severity-cutoff: high
          output-format: table
      
      - name: Vulnerability Scan (JSON for Artifact)
        id: scan_json
        if: steps.scan.outcome == 'failure'
        uses: anchore/scan-action@7037fa011853d5a11690026fb85feee79f4c946c # v7.3.2
        with:
          image: "pepr:dev"
          fail-build: false
          severity-cutoff: high
          output-format: json
      
      - name: Upload Scan Results
        if: steps.scan.outcome == 'failure'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: vulnerability-scan-results
          path: ${{ steps.scan_json.outputs.json }}
          retention-days: 30
      
      - name: Fail Build on Vulnerabilities
        if: steps.scan.outcome == 'failure'
        run: exit 1
      
      - name: Generate SBOM
        uses: anchore/sbom-action@57aae528053a48a3f6235f2d9461b05fbcb7366d # v0.23.1
        with:
          image: pepr:dev
          upload-artifact: true
          upload-artifact-retention: 30
