name: Container Scans

permissions:
  actions: read

on:
  pull_request:
    paths-ignore:
    - "**.md"
    - "LICENSE"
    - "CODEOWNERS"  
  
jobs:
  container-scans:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Use Node.js latest
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: "npm"
      - name: Install Pepr Dependencies
        run: npm ci
      - name: Build Pepr Controller Image
        run: npm run build:image

      - name: Vulnerability Scan
        id: scan
        continue-on-error: true # Scan again with JSON output for artifact upload
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: "pepr:dev"
          fail-build: true
          severity-cutoff: high
          output-format: table
      
      - name: Vulnerability Scan (JSON for Artifact)
        id: scan_json
        if: steps.scan.outcome == 'failure'
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: "pepr:dev"
          fail-build: false
          severity-cutoff: high
          output-format: json
      
      - name: Upload Scan Results
        if: steps.scan.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vulnerability-scan-results
          path: ${{ steps.scan_json.outputs.json }}
          retention-days: 30
      
      - name: Fail Build on Vulnerabilities
        if: steps.scan.outcome == 'failure'
        run: exit 1
      
      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: pepr:dev
          upload-artifact: true
          upload-artifact-retention: 30
