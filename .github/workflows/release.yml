name: Version Release # WARNING: docs.yml workflow_run trigger depends on this exact name

on:
  push:
    branches: ["main"]
    paths-ignore:
    - "LICENSE"
    - "CODEOWNERS"

permissions:
  contents: read
  id-token: write # Required for OIDC

jobs:
  tag-new-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created || 'false' }}
      release_version: ${{ steps.release.outputs.version || 'UNRELEASED' }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Create Release
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-and-publish-images:
    needs: [publish, tag-new-version]
    if: ${{ needs.tag-new-version.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write
      packages: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Use Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Login to Chainguard
        uses: chainguard-dev/setup-chainctl@2cddd35a2f120d9973e58094dc6878c93cf58c28 # v0.5.1
        with:
          identity: ${{ secrets.CHAINGUARD_IDENTITY }}

      - name: UDS Registry Login
        run: echo "${{ secrets.UDS_REGISTRY_PASSWORD }}" | docker login -u "${{ secrets.UDS_REGISTRY_USERNAME }}" --password-stdin registry.defenseunicorns.com
        shell: bash

      - name: "Pepr Controller: Login to GHCR"
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: dummy
          password: ${{ github.token }}

      - name: Set Version
        env:
          RELEASE_VERSION: ${{ needs.tag-new-version.outputs.release_version }}
        run: |
          node ./scripts/set-version.js "$RELEASE_VERSION"
          npm ci

      - name: Publish to GHCR
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          RELEASE_VERSION: ${{ needs.tag-new-version.outputs.release_version }}
        run: ./.github/workflows/scripts/release.sh "$RELEASE_VERSION"

  # SLSA builder does a shallow clone (fetch-depth: 1). The "set-version" npm
  # script handles this by running "git fetch --tags --force" before
  # "git describe --tags" to find the tag release-please just created.
  slsa:  # This is where the slsa tarball is built for publish-package step
    if: ${{ needs.tag-new-version.outputs.release_created == 'true' }}
    permissions:
      id-token: write
      actions: read
      contents: read
    needs: [tag-new-version]
    uses: slsa-framework/slsa-github-generator/.github/workflows/builder_nodejs_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a #v2.1.0
    with:
      run-scripts: "set-version, ci, build"
    secrets: inherit

  publish:
    if: ${{ needs.tag-new-version.outputs.release_created == 'true' }}
    needs: [slsa, tag-new-version]
    runs-on: ubuntu-latest
    env:
      PEPR_VERSION: ${{ needs.tag-new-version.outputs.release_version }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Node registry authentication
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26
          registry-url: "https://registry.npmjs.org"

      - name: Set Version
        run: |
          node ./scripts/set-version.js "$PEPR_VERSION"
          npm ci
          npm run build

      - name: Publish package
        id: publish
        uses: slsa-framework/slsa-github-generator/actions/nodejs/publish@4d014fae4dbd39eb09e8d40348b73db095e6ba9a # v2.0.0
        with:
          access: public
          node-auth-token: ${{ secrets.NPM_TOKEN }}
          package-name: ${{ needs.slsa.outputs.package-name }}
          package-download-name: ${{ needs.slsa.outputs.package-download-name }}
          package-download-sha256: ${{ needs.slsa.outputs.package-download-sha256 }}
          provenance-name: ${{ needs.slsa.outputs.provenance-name }}
          provenance-download-name: ${{ needs.slsa.outputs.provenance-download-name }}
          provenance-download-sha256: ${{ needs.slsa.outputs.provenance-download-sha256 }}

  pack-and-push:
    if: ${{ needs.tag-new-version.outputs.release_created == 'true' }}
    needs: [publish, tag-new-version]
    runs-on: ubuntu-latest
    env:
      PEPR_VERSION: ${{ needs.tag-new-version.outputs.release_version }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Use Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Download ORAS
        run: |
          VERSION="1.2.2"
          curl -LO "https://github.com/oras-project/oras/releases/download/v${VERSION}/oras_${VERSION}_linux_amd64.tar.gz"
          mkdir -p oras-install/
          tar -zxf oras_${VERSION}_*.tar.gz -C oras-install/
          sudo mv oras-install/oras /usr/local/bin/
          rm -rf oras_${VERSION}_*.tar.gz oras-install/

      - name: Docker login to UDS registry
        run: echo "${{ secrets.UDS_REGISTRY_PASSWORD }}" | docker login -u "${{ secrets.UDS_REGISTRY_USERNAME }}" --password-stdin registry.defenseunicorns.com

      - name: Push package to UDS OCI registry
        run: |
          npm install --global npm
          node ./scripts/set-version.js "$PEPR_VERSION"
          npm ci
          npm run build
          oras push registry.defenseunicorns.com/pepr-dev/npm/pepr:v${PEPR_VERSION} \
            --artifact-type application/vnd.pepr.module.layer.v1 pepr-${PEPR_VERSION}.tgz
