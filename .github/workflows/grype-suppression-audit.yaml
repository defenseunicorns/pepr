name: Grype Suppression Audit

on:
  schedule:
    - cron: "0 8 * * 1" # Weekly on Monday at 8am UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: grype-suppression-audit
  cancel-in-progress: false

jobs:
  audit:
    name: Audit CVE Suppressions
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js latest
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: "npm"

      - name: Install Pepr Dependencies
        run: npm ci

      - name: Build Pepr Controller Image
        run: npm run build:image

      - name: Install grype
        id: grype
        uses: anchore/scan-action/download-grype@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0

      - name: Audit suppression list
        env:
          GRYPE_CMD: ${{ steps.grype.outputs.cmd }}
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: npx tsx .github/workflows/scripts/audit-grype-suppressions.ts
