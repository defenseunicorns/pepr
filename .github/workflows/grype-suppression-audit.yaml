name: Grype Suppression Audit

on:
  schedule:
    - cron: "0 8 * * 1" # Weekly on Monday at 8am UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: grype-suppression-audit
  cancel-in-progress: false

jobs:
  audit:
    name: Audit CVE Suppressions
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Create GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.GRYPE_AUDIT_GITHUB_APP_ID }}
          private-key: ${{ secrets.GRYPE_AUDIT_GITHUB_APP_SECRET }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Use Node.js latest
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26
          cache: "npm"

      - name: Install Pepr Dependencies
        run: npm ci

      - name: Build Pepr Controller Image
        run: npm run build:image

      - name: Install grype
        id: grype
        uses: anchore/scan-action/download-grype@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0

      - name: Audit suppression list
        env:
          GRYPE_CMD: ${{ steps.grype.outputs.cmd }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: npx tsx .github/workflows/scripts/audit-grype-suppressions.ts
