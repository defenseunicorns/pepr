name: Grype Suppression Audit

on:
  schedule:
    - cron: "0 8 * * 1" # Weekly on Monday at 8am UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: grype-suppression-audit
  cancel-in-progress: false

jobs:
  audit:
    name: Audit CVE Suppressions
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Create GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.GRYPE_AUDIT_GITHUB_APP_ID }}
          private-key: ${{ secrets.GRYPE_AUDIT_GITHUB_APP_SECRET }}

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Use Node.js latest
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 26
          cache: "npm"

      - name: Install Pepr Dependencies
        run: npm ci

      - name: Build Pepr Controller Image
        run: npm run build:image

      - name: Install grype
        id: grype
        uses: anchore/scan-action/download-grype@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0

      - name: Audit suppression list
        env:
          GRYPE_CMD: ${{ steps.grype.outputs.cmd }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: npx tsx .github/workflows/scripts/audit-grype-suppressions.ts
