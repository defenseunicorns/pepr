name: Peer Dependencies Update

on:
  schedule:
    # Weekly, Monday 06:00 UTC. Avoids existing daily nightlies (00:00 UTC) and
    # the Sunday scorecard run; lines up with the 7-day Dependabot cooldown so
    # peer-dep PRs land in the same review rhythm as production-dep PRs.
    - cron: "0 6 * * MON"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: peer-deps-update
  cancel-in-progress: false

jobs:
  discover:
    name: Discover pending peer-dep bumps
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      empty: ${{ steps.set-matrix.outputs.empty }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build matrix
        id: set-matrix
        run: node scripts/update-peer-deps.mjs report --matrix >> "$GITHUB_OUTPUT"

  propose:
    name: Propose peer-dep PR
    needs: discover
    if: needs.discover.outputs.empty == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # `prod` is where the GitHub App credentials live as environment secrets;
    # without this block they resolve to empty strings and the token step fails.
    environment: prod
    permissions:
      contents: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Create GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.DOCS_WORKFLOW_GITHUB_APP_ID }}
          private-key: ${{ secrets.DOCS_WORKFLOW_GITHUB_APP_SECRET }}
      # `token` is the GitHub App installation token created above. App-token
      # PRs (unlike PRs opened with GITHUB_TOKEN) trigger pull_request-event
      # workflows on the bot's PRs — specifically node.js.yml, which is the
      # gate the team relies on for format / unit / integration coverage.
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          token: ${{ steps.app-token.outputs.token }}
      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Apply bump
        env:
          KIND: ${{ matrix.kind }}
          PKG: ${{ matrix.pkg }}
        run: node scripts/update-peer-deps.mjs apply --kind "$KIND" --pkg "$PKG"
      - name: Refresh lockfile
        run: npm install --package-lock-only --ignore-scripts
      - name: Format check
        run: npm run format:check
      - name: Build
        run: npm run build
      - name: Unit tests
        run: npm run test:unit
      - name: Open PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          KIND: ${{ matrix.kind }}
          PKG: ${{ matrix.pkg }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/update-peer-deps.mjs open-pr --kind "$KIND" --pkg "$PKG" --run-url "$RUN_URL"
