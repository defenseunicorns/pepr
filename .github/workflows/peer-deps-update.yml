name: Peer Dependencies Update

on:
  schedule:
    # Weekly, Monday 06:00 UTC. Avoids existing daily nightlies (00:00 UTC) and
    # the Sunday scorecard run; lines up with the 7-day Dependabot cooldown so
    # peer-dep PRs land in the same review rhythm as production-dep PRs.
    - cron: "0 6 * * MON"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  discover:
    name: Discover pending peer-dep bumps
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      empty: ${{ steps.set-matrix.outputs.empty }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build matrix
        id: set-matrix
        run: node scripts/update-peer-deps.mjs report --matrix >> "$GITHUB_OUTPUT"

  propose:
    name: Propose peer-dep PR
    needs: discover
    if: needs.discover.outputs.empty == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}
    steps:
      # `token` is set so subsequent `git push` and `gh pr create` calls use
      # PEER_DEPS_PR_TOKEN if available. Without that PAT the default
      # GITHUB_TOKEN works, but PRs created with it do not trigger
      # pull_request-event workflows (a documented GitHub limitation), which
      # would leave node.js.yml ungated on these PRs.
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          token: ${{ secrets.PEER_DEPS_PR_TOKEN || secrets.GITHUB_TOKEN }}
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Apply bump
        env:
          KIND: ${{ matrix.kind }}
          PKG: ${{ matrix.pkg }}
        run: node scripts/update-peer-deps.mjs apply --kind "$KIND" --pkg "$PKG"
      - name: Refresh lockfile
        run: npm install
      - name: Format check
        run: npm run format:check
      - name: Build
        run: npm run build
      - name: Unit tests
        run: npm run test:unit
      - name: Open PR
        env:
          GH_TOKEN: ${{ secrets.PEER_DEPS_PR_TOKEN || secrets.GITHUB_TOKEN }}
          KIND: ${{ matrix.kind }}
          PKG: ${{ matrix.pkg }}
        run: node scripts/update-peer-deps.mjs open-pr --kind "$KIND" --pkg "$PKG"
