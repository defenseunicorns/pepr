name: Peer Dependencies Update

on:
  schedule:
    # Weekly, Monday 06:00 UTC. Avoids existing daily nightlies (00:00 UTC) and
    # the Sunday scorecard run; lines up with the 7-day Dependabot cooldown so
    # peer-dep PRs land in the same review rhythm as production-dep PRs.
    - cron: "0 6 * * MON"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  discover:
    name: Discover pending peer-dep bumps
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      empty: ${{ steps.set-matrix.outputs.empty }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build matrix
        id: set-matrix
        run: node scripts/update-peer-deps.mjs report --matrix >> "$GITHUB_OUTPUT"

  propose:
    name: Propose peer-dep PR
    needs: discover
    if: needs.discover.outputs.empty == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Apply bump
        id: apply
        env:
          KIND: ${{ matrix.kind }}
          PKG: ${{ matrix.pkg }}
        run: node scripts/update-peer-deps.mjs apply --kind "$KIND" --pkg "$PKG" --github-output >> "$GITHUB_OUTPUT"
      - name: Refresh lockfile
        run: npm install
      - name: Format check
        run: npm run format:check
      - name: Build
        run: npm run build
      - name: Unit tests
        run: npm run test:unit
      - name: Build PR body
        id: body
        env:
          KIND: ${{ matrix.kind }}
          PKG: ${{ matrix.pkg }}
        run: node scripts/update-peer-deps.mjs pr-body --kind "$KIND" --pkg "$PKG" --github-output >> "$GITHUB_OUTPUT"
      - name: Open pull request
        uses: peter-evans/create-pull-request@v6
        with:
          # Default GITHUB_TOKEN does not trigger pull_request workflows on the
          # opened PR (a documented GitHub limitation). Provision a project PAT
          # or GitHub-App token at PEER_DEPS_PR_TOKEN so node.js.yml runs and
          # gates these PRs the same as a human-authored one.
          token: ${{ secrets.PEER_DEPS_PR_TOKEN || secrets.GITHUB_TOKEN }}
          branch: ${{ steps.apply.outputs.branch }}
          base: main
          title: ${{ steps.apply.outputs.title }}
          body: ${{ steps.body.outputs.body }}
          commit-message: ${{ steps.apply.outputs.title }}
          labels: |
            dependencies
            automated
          delete-branch: true
          signoff: true
